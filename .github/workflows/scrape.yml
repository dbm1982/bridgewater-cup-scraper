name: Scrape Bridgewater Cup

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Install Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        working-directory: bridgewater-cup-scraper
        run: |
          pip install -r requirements.txt
          playwright install chromium

      - name: Scrape division schedules
        working-directory: bridgewater-cup-scraper
        run: python scrape_gotsport.py

      - name: Normalize data
        working-directory: bridgewater-cup-scraper
        run: python normalize_gotsport.py

      - name: Generate ICS calendars
        working-directory: bridgewater-cup-scraper
        run: python generate_ics.py

      - name: Commit results
        working-directory: bridgewater-cup-scraper
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add division_meta.json gotsport_raw.csv gotsport_normalized.csv bridgewater_cup_all.ics calendars/*.ics
          git commit -m "Auto-update Bridgewater Cup calendars" || echo "No changes"
          git push
