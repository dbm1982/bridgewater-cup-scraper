name: Scrape Bridgewater Cup

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3
        with:
          persist-credentials: true
          fetch-depth: 0

      - name: Install Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install chromium

      - name: Scrape division schedules
        run: python scrape_gotsport.py

      - name: Normalize data
        run: python normalize_gotsport.py

      - name: Generate ICS calendars
        run: python generate_ics.py

      - name: Commit results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add division_meta.json gotsport_raw.csv gotsport_normalized.csv bridgewater_cup_all.ics calendars
          git commit -m "Auto-update Bridgewater Cup calendars" || echo "No changes to commit"
          git push
